<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mad Scientist Lab</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0a0a16; overflow:hidden; }
    canvas { display:block; width:100vw; height:100vh; }
  </style>
</head>
<body>
<canvas id="c"></canvas>

<script>
(() => {
  const cv = document.getElementById('c');
  const ctx = cv.getContext('2d');
  function resize() { cv.width=cv.offsetWidth; cv.height=cv.offsetHeight; }
  window.addEventListener('resize', resize); resize();

  // ── ISOMETRIC RENDERER ──────────────────────────────────────────
  const TW=64, TH=32;
  function p(x,y,z=0) {
    const cx=player.x+0.44, cy=player.y+0.35;
    return { x:cv.width/2+(x-cx-(y-cy))*(TW/2), y:cv.height/2+(x-cx+(y-cy))*(TH/2)-z*TH+20 };
  }
  function tint(hex,f) {
    const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
    return `rgb(${Math.round(r*f)},${Math.round(g*f)},${Math.round(b*f)})`;
  }
  function poly(pts,col,edge='rgba(0,0,0,0.09)') {
    ctx.beginPath(); pts.forEach((q,i)=>i?ctx.lineTo(q.x,q.y):ctx.moveTo(q.x,q.y));
    ctx.closePath(); ctx.fillStyle=col; ctx.fill();
    if(edge){ctx.strokeStyle=edge;ctx.lineWidth=0.7;ctx.stroke();}
  }
  function box(x,y,z,w,d,h,col) {
    poly([p(x,y,z+h),p(x+w,y,z+h),p(x+w,y+d,z+h),p(x,y+d,z+h)],tint(col,1.00));
    poly([p(x,y+d,z),p(x+w,y+d,z),p(x+w,y+d,z+h),p(x,y+d,z+h)],tint(col,0.68));
    poly([p(x+w,y,z),p(x+w,y+d,z),p(x+w,y+d,z+h),p(x+w,y,z+h)],tint(col,0.50));
  }
  function tile(gx,gy,col) {
    poly([p(gx,gy),p(gx+1,gy),p(gx+1,gy+1),p(gx,gy+1)],col,'rgba(0,0,0,0.06)');
  }
  function tileColor(gx,gy) {
    if(((gx%8)+8)%8===0&&((gy%8)+8)%8===0) return '#2a2a3a';
    return (gx+gy)%2===0?'#1e1e2c':'#1a1a28';
  }

  // ── PALETTES ─────────────────────────────────────────────────────
  const SHIRTS=['#4488EE','#44AA55','#CC8833','#AA44CC','#33AACC','#EE8833','#BB3366','#33CCAA'];
  const HAIRS =['#1a1a44','#5a3320','#222244','#3a2010','#1a3a1a','#4a2020','#2a1a44','#1a4a3a'];
  const PANTSC=['#442222','#224422','#222244','#442244','#224444'];

  // ── INVENTION DATA ────────────────────────────────────────────────
  const INV_NAMES={
    1:['Fizzy Widget','Spark Cube','Wobble Coil','Buzz Flask','Zing Rod'],
    2:['Quantum Donut','Vortex Plate','Hum Device','Spin Lens','Phase Gear'],
    3:['Hyper Node','Void Crystal','Flux Engine','Dark Module','Omega Cell'],
  };
  const INV_COL ={1:'#FFD700',2:'#44CCFF',3:'#FF44CC'};
  const INV_SELL={1:[2,4],   2:[8,14],   3:[20,35]};

  // ── LAB BOUNDS ────────────────────────────────────────────────────
  // Player is clamped inside; customers roam outside
  const LAB={x1:-7.5,y1:-3.5,x2:-0.2,y2:3.5};
  // Fence perimeter (slightly larger than lab bounds)
  const FX1=-7.9, FY1=-3.9, FX2=0.5, FY2=3.9;
  // Gap in right wall where shelf window is
  const GATE_Y1=-0.8, GATE_Y2=0.6;

  // Pre-compute fence post positions
  const FENCE_POSTS=[];
  (function() {
    const S=1.2;
    for(let fy=FY1;fy<=FY2+0.01;fy+=S) {
      if(fy>=GATE_Y1-0.1&&fy<=GATE_Y2+0.1) continue;
      FENCE_POSTS.push({x:FX2,y:fy});
    }
    for(let fy=FY1;fy<=FY2+0.01;fy+=S) FENCE_POSTS.push({x:FX1,y:fy});
    for(let fx=FX1+S;fx<FX2;fx+=S) FENCE_POSTS.push({x:fx,y:FY1});
    for(let fx=FX1+S;fx<FX2;fx+=S) FENCE_POSTS.push({x:fx,y:FY2});
  })();

  // ── MACHINES — locked tiers start covered ────────────────────────
  const MACHINES=[
    { x:-6,y:-2,type:'flask',      tier:1,baseSpeed:0.030,col:'#1e4477',progress:0,
      locked:false, unlockCost:0,
      upgraded:false, upgradeCost:40,  upgradeDesc:'2× speed + glow' },
    { x:-6,y: 0,type:'centrifuge', tier:2,baseSpeed:0.015,col:'#1a4433',progress:0,
      locked:true,  unlockCost:60,
      upgraded:false, upgradeCost:150, upgradeDesc:'2× speed + dual spin' },
    { x:-6,y: 2,type:'blackboard', tier:3,baseSpeed:0.008,col:'#3a1a55',progress:0,
      locked:true,  unlockCost:220,
      upgraded:false, upgradeCost:500, upgradeDesc:'2× speed + plasma glow' },
  ];

  // ── SHOP SHELF (just outside the fence gate) ──────────────────────
  const SHELF={x:1.5,y:-0.6,w:2.2,d:1.0};
  const MAX_SHELF=5;
  const shelfInventory=[];

  // ── GLOBAL UPGRADES (auto-buy from money) ─────────────────────────
  const UPG={conveyor:false,labBot:false,marketingBot:false,robotFactory:false};
  const GLOBAL_UPGRADES=[
    {key:'conveyor',    cost:80,  label:'CONVEYOR',  desc:'auto-fill shelf'},
    {key:'labBot',      cost:120, label:'LAB BOT',   desc:'bot assists machines'},
    {key:'marketingBot',cost:200, label:'MARKETING', desc:'2× customer rate'},
    {key:'robotFactory',cost:500, label:'FACTORY',   desc:'bonus t1 every 10s'},
  ];

  // ── LAB BOT ───────────────────────────────────────────────────────
  const labBotNPC={x:-4,y:-3,active:false,walkCycle:0,walkTimer:0};

  // ── SPAWNING ──────────────────────────────────────────────────────
  let customerInterval=8.0, customerTimer=0;

  // ── PLAYER ────────────────────────────────────────────────────────
  const player={x:-3,y:0,speed:4,money:0,interactAnim:0};
  let walkCycle=0,walkTimer=0,gameTime=0;

  // ── MISC ──────────────────────────────────────────────────────────
  const slapFX=[],NPCs=[];
  let robotTimer=0;

  // ── INPUT ─────────────────────────────────────────────────────────
  const keys={};
  let pendingWork=false,pendingBuy=false,spaceDown=false;
  window.addEventListener('keydown',e=>{
    const k=e.key.toLowerCase();
    if(['w','a','s','d','arrowup','arrowdown','arrowleft','arrowright',' ','e'].includes(k)) e.preventDefault();
    if(k===' '){ if(!spaceDown){spaceDown=true;pendingWork=true;} }
    if(k==='e') pendingBuy=true;
    keys[k]=true;
  });
  window.addEventListener('keyup',e=>{
    keys[e.key.toLowerCase()]=false;
    if(e.key===' ') spaceDown=false;
  });

  // ── NPC FACTORY (spawns OUTSIDE lab) ─────────────────────────────
  function makeCustomer() {
    const i=~~(Math.random()*SHIRTS.length);
    const ex=2+Math.random()*9, ey=-6+Math.random()*12;
    return {
      x:ex,y:ey,
      shirt:SHIRTS[i],hair:HAIRS[i],pants:PANTSC[~~(Math.random()*PANTSC.length)],
      state:'wandering',stateTimer:Math.random()*2,
      targetX:ex+(Math.random()-.5)*8, targetY:ey+(Math.random()-.5)*8,
      walkCycle:0,walkTimer:0,speed:1.3+Math.random()*0.4,
    };
  }
  function initNPCs(){NPCs.length=0;for(let i=0;i<3;i++) NPCs.push(makeCustomer());}
  initNPCs();

  // ── MACHINE COMPLETION ────────────────────────────────────────────
  function completeMachine(m) {
    m.progress=0;
    const [lo,hi]=INV_SELL[m.tier];
    const sellVal=lo+~~(Math.random()*(hi-lo+1));
    const name=INV_NAMES[m.tier][~~(Math.random()*INV_NAMES[m.tier].length)];
    slapFX.push({x:m.x+0.3,y:m.y,z:2.5,t:1.5,text:'DONE!',col:INV_COL[m.tier]});
    if(shelfInventory.length<MAX_SHELF) {
      shelfInventory.push({tier:m.tier,name,sellVal});
    } else {
      const half=Math.floor(sellVal/2);
      player.money+=half;
      slapFX.push({x:m.x,y:m.y-0.3,z:2.0,t:1.0,text:`+$${half} (full)`,col:'#FFAA44'});
    }
  }

  // ── MACHINE UPDATE ────────────────────────────────────────────────
  function updateMachines(dt) {
    MACHINES.forEach(m=>{
      if(m.locked) return;
      const mult=(m.upgraded?2.0:1.0);
      m.progress=Math.min(1,m.progress+m.baseSpeed*mult*dt);
      if(m.progress>=1) completeMachine(m);
    });
    if(UPG.robotFactory) {
      robotTimer+=dt;
      if(robotTimer>=10) {
        robotTimer=0;
        const t1=MACHINES.find(m=>m.tier===1&&!m.locked);
        if(t1&&t1.progress<1){t1.progress=1;completeMachine(t1);}
      }
    }
  }

  // ── LAB BOT UPDATE ────────────────────────────────────────────────
  function updateLabBot(dt) {
    if(!UPG.labBot||!labBotNPC.active) return;
    let target=null,highP=-1;
    MACHINES.forEach(m=>{if(!m.locked&&m.progress>highP&&m.progress<1){highP=m.progress;target=m;}});
    if(!target) return;
    const tx=target.x+0.5,ty=target.y+0.5;
    const ddx=tx-labBotNPC.x,ddy=ty-labBotNPC.y,dd=Math.sqrt(ddx*ddx+ddy*ddy);
    if(dd>1.2) {
      labBotNPC.x+=ddx/dd*2.2*dt; labBotNPC.y+=ddy/dd*2.2*dt;
      labBotNPC.walkTimer+=dt;
      if(labBotNPC.walkTimer>0.18){labBotNPC.walkTimer=0;labBotNPC.walkCycle=1-labBotNPC.walkCycle;}
    } else {
      const mult=(target.upgraded?2.0:1.0);
      target.progress=Math.min(1,target.progress+0.08*mult*dt);
    }
  }

  // ── GET NEAREST MACHINE ───────────────────────────────────────────
  function getNearestMachine(maxDist) {
    let nearest=null,nearD=Infinity;
    MACHINES.forEach(m=>{
      const ddx=m.x+0.5-(player.x+0.44),ddy=m.y+0.5-(player.y+0.35);
      const d=Math.sqrt(ddx*ddx+ddy*ddy);
      if(d<maxDist&&d<nearD){nearest=m;nearD=d;}
    });
    return nearest;
  }

  // ── WORK (SPACE) — boost nearest unlocked machine ─────────────────
  function tryWork() {
    player.interactAnim=0.35;
    const m=getNearestMachine(2.2);
    if(!m||m.locked) return;
    const mult=(m.upgraded?2.0:1.0);
    m.progress=Math.min(1,m.progress+0.14*mult);
    slapFX.push({x:m.x+0.3,y:m.y,z:2.1,t:0.5,text:'⚗',col:'#88FFCC'});
  }

  // ── BUY/UNLOCK (E) ────────────────────────────────────────────────
  function tryBuy() {
    const m=getNearestMachine(2.5);
    if(!m) return;
    if(m.locked) {
      if(player.money>=m.unlockCost) {
        player.money-=m.unlockCost;
        m.locked=false;
        slapFX.push({x:m.x+0.5,y:m.y,z:3.0,t:2.5,text:'UNLOCKED!',col:'#88FFCC'});
      } else {
        const need=m.unlockCost-player.money;
        slapFX.push({x:m.x+0.5,y:m.y,z:2.8,t:1.5,text:`Need $${need} more`,col:'#FF6644'});
      }
    } else if(!m.upgraded) {
      if(player.money>=m.upgradeCost) {
        player.money-=m.upgradeCost;
        m.upgraded=true;
        slapFX.push({x:m.x+0.5,y:m.y,z:3.0,t:2.5,text:'UPGRADED!',col:'#FFD700'});
      } else {
        const need=m.upgradeCost-player.money;
        slapFX.push({x:m.x+0.5,y:m.y,z:2.8,t:1.5,text:`Need $${need} more`,col:'#FF6644'});
      }
    }
  }

  // ── NPC UPDATE ────────────────────────────────────────────────────
  function updateNPCs(dt) {
    customerTimer+=dt;
    if(customerTimer>=customerInterval&&NPCs.length<10){
      customerTimer=0; NPCs.push(makeCustomer());
    }
    NPCs.forEach(n=>{
      // keep customers outside lab (x > FX2-1 or far from fence)
      if(n.state==='wandering'&&Math.abs(n.x-8)>18){
        n.x=3+Math.random()*8; n.y=-4+Math.random()*8;
        n.targetX=n.x+(Math.random()-.5)*6; n.targetY=n.y+(Math.random()-.5)*6;
      }
      if(n.state==='wandering') {
        const ddx=n.targetX-n.x,ddy=n.targetY-n.y,dd=Math.sqrt(ddx*ddx+ddy*ddy);
        if(dd<0.3) {
          n.state='waiting'; n.stateTimer=1.0+Math.random()*1.5; n.walkCycle=0;
        } else {
          n.x+=ddx/dd*n.speed*dt; n.y+=ddy/dd*n.speed*dt;
          n.walkTimer+=dt; if(n.walkTimer>0.20){n.walkTimer=0;n.walkCycle=1-n.walkCycle;}
          // don't let wandering NPCs enter lab
          if(n.x<FX2+0.5) { n.x=FX2+0.5; n.targetX=FX2+1+Math.random()*4; }
        }
      } else if(n.state==='waiting') {
        n.stateTimer-=dt;
        if(n.stateTimer<=0) {
          if(shelfInventory.length>0&&Math.random()<0.7) {
            n.state='going_to_shelf';
          } else {
            n.targetX=3+Math.random()*6; n.targetY=-3+Math.random()*6;
            n.state='wandering';
          }
        }
      } else if(n.state==='going_to_shelf') {
        if(shelfInventory.length===0){n.state='wandering';return;}
        const tx=SHELF.x+SHELF.w*0.5, ty=SHELF.y+SHELF.d*0.5;
        const ddx=tx-n.x,ddy=ty-n.y,dd=Math.sqrt(ddx*ddx+ddy*ddy);
        if(dd<0.9){
          n.state='buying'; n.stateTimer=1.2+Math.random()*0.6; n.walkCycle=0;
        } else {
          n.x+=ddx/dd*n.speed*dt; n.y+=ddy/dd*n.speed*dt;
          n.walkTimer+=dt; if(n.walkTimer>0.20){n.walkTimer=0;n.walkCycle=1-n.walkCycle;}
        }
      } else if(n.state==='buying') {
        n.stateTimer-=dt;
        if(n.stateTimer<=0) {
          if(shelfInventory.length>0) {
            const item=shelfInventory.shift();
            player.money+=item.sellVal;
            slapFX.push({x:SHELF.x+SHELF.w*.5,y:SHELF.y,z:2.0,t:1.4,text:`+$${item.sellVal}`,col:'#FFD700'});
          }
          n.state='wandering';
          n.targetX=3+Math.random()*6; n.targetY=-3+Math.random()*6;
        }
      }
    });
    player.interactAnim=Math.max(0,player.interactAnim-dt*3);
  }

  // ── GLOBAL UPGRADE CHECK (auto-buy) ──────────────────────────────
  function checkGlobalUpgrades() {
    for(const u of GLOBAL_UPGRADES) {
      if(UPG[u.key]) continue;
      if(player.money>=u.cost) {
        player.money-=u.cost;
        UPG[u.key]=true;
        if(u.key==='labBot'){labBotNPC.active=true;labBotNPC.x=-4;labBotNPC.y=-1;}
        if(u.key==='marketingBot') customerInterval=4.0;
        slapFX.push({x:player.x,y:player.y-0.8,z:2.8,t:2.5,text:`${u.label} UNLOCKED!`,col:'#88FFCC'});
        break;
      }
    }
  }

  // ── RESTART ───────────────────────────────────────────────────────
  function restartGame() {
    player.x=-3;player.y=0;player.money=0;player.interactAnim=0;
    GLOBAL_UPGRADES.forEach(u=>UPG[u.key]=false);
    MACHINES[0].baseSpeed=0.030;MACHINES[1].baseSpeed=0.015;MACHINES[2].baseSpeed=0.008;
    MACHINES.forEach(m=>{m.progress=0;m.locked=(m.tier>1);m.upgraded=false;});
    shelfInventory.length=0;slapFX.length=0;NPCs.length=0;
    customerInterval=8.0;customerTimer=0;robotTimer=0;
    labBotNPC.active=false;labBotNPC.x=-4;labBotNPC.y=-3;
    initNPCs();
  }

  // ── DRAW: CHARACTER ───────────────────────────────────────────────
  function drawChar(cx,cy,shirt,pants,hair,wk,anim=0,badge=false) {
    const sk='#F2B87A',shoe='#181828';
    const lz=wk===1?0.06:0,rz=wk===0?0.06:0;
    const swing=anim>0?Math.sin((1-anim/0.35)*Math.PI):0;
    const armDY=-0.28*swing,armDZ=0.42*swing;
    box(cx-0.24,cy+0.14,0.62,0.20,0.34,0.34,shirt);
    box(cx-0.24,cy+0.14,0.22,0.20,0.34,0.40,sk);
    box(cx+0.08,cy+0.04,0,        0.29,0.50,0.13,shoe);
    box(cx+0.51,cy+0.04,0,        0.29,0.50,0.13,shoe);
    box(cx+0.10,cy+0.08,0.13+lz,  0.27,0.42,0.43,pants);
    box(cx+0.51,cy+0.08,0.13+rz,  0.27,0.42,0.43,pants);
    box(cx+0.02,cy+0.03,0.56,0.84,0.72,0.58,shirt);
    if(badge) box(cx+0.54,cy+0.70,0.88,0.14,0.06,0.14,'#FFD700');
    box(cx+0.13,cy+0.13,1.14,0.60,0.54,0.60,sk);
    box(cx+0.13,cy+0.13,1.74,0.60,0.54,0.14,hair);
    box(cx+0.22,cy+0.66,1.44,0.14,0.025,0.14,'#0a0a1c');
    box(cx+0.50,cy+0.66,1.44,0.14,0.025,0.14,'#0a0a1c');
    box(cx+0.86,cy+0.12+armDY,0.62+armDZ,0.20,0.34,0.34,shirt);
    box(cx+0.86,cy+0.12+armDY,0.22+armDZ,0.20,0.34,0.40,sk);
  }

  // ── DRAW: LOCKED MACHINE ──────────────────────────────────────────
  function drawLockedMachine(m) {
    const {x,y}=m;
    // Dark crate/cover
    box(x-0.05,y-0.05,0,1.3,1.1,1.6,'#1a1218');
    box(x,     y,     1.6,1.2,1.0,0.10,'#2a1a28');
    // Question mark band
    box(x+0.02,y+0.02,0.5,1.16,0.96,0.08,'#332233');
    // Price tag
    box(x+0.38,y+0.25,1.71,0.44,0.06,0.32,'#EED044');
    box(x+0.42,y+0.27,2.03,0.36,0.04,0.04,'#CC9900');
    // "?" symbol using small boxes
    box(x+0.52,y+0.27,1.76,0.20,0.04,0.16,'#2a1a28');
    box(x+0.52,y+0.27,1.92,0.20,0.04,0.08,'#2a1a28');
    box(x+0.56,y+0.27,1.72,0.12,0.04,0.06,'#2a1a28');
  }

  // ── DRAW: ACTIVE MACHINE ──────────────────────────────────────────
  function drawMachine(m) {
    const {x,y,type,tier,progress,upgraded}=m;

    if(type==='flask') {
      const fc=upgraded?tint(m.col,1.6):m.col;
      // glow when upgraded
      if(upgraded) {
        const gp=p(x+0.5,y+0.45,0.8);
        const gr=ctx.createRadialGradient(gp.x,gp.y,3,gp.x,gp.y,36);
        gr.addColorStop(0,'rgba(102,255,200,0.30)');
        gr.addColorStop(1,'rgba(102,255,200,0)');
        ctx.save(); ctx.fillStyle=gr;
        ctx.beginPath(); ctx.arc(gp.x,gp.y,36,0,Math.PI*2); ctx.fill();
        ctx.restore();
      }
      box(x,y,0,1.0,0.9,0.50,fc);
      box(x+0.20,y+0.10,0.50,0.60,0.55,0.38,tint(fc,1.35));
      box(x+0.36,y+0.26,0.88,0.28,0.26,0.56,tint(fc,0.75));
      box(x+0.30,y+0.20,1.44,0.40,0.34,0.16,'#66FFCC');
      if(progress>0.1) {
        const bx=x+0.42+Math.sin(gameTime*4)*0.06, bz=1.62+Math.sin(gameTime*6+1)*0.08;
        box(bx,y+0.30,bz,0.10,0.08,0.10,'#AAFFEE');
        if(upgraded) {
          box(bx-0.16,y+0.34,bz+0.02,0.08,0.06,0.08,'#66FFCC');
          box(bx+0.18,y+0.28,bz+0.05,0.07,0.05,0.09,'#AAFFCC');
          box(bx+0.04,y+0.38,bz+0.12,0.06,0.05,0.06,'#FFFFFF');
        }
      }

    } else if(type==='centrifuge') {
      const cc=upgraded?tint(m.col,1.5):m.col;
      box(x,y,0,1.0,1.0,0.48,'#112233');
      box(x+0.06,y+0.06,0.48,0.88,0.88,0.20,cc);
      box(x+0.26,y+0.26,0.68,0.48,0.48,0.14,tint(cc,1.6));
      const spinRate=upgraded?8:2;
      const a=gameTime*(spinRate+progress*4);
      box(x+0.44+Math.cos(a)*0.20,y+0.46+Math.sin(a)*0.12,0.83,0.14,0.12,0.08,'#AAFFDD');
      if(upgraded) {
        // second opposing arm
        const a2=a+Math.PI;
        box(x+0.44+Math.cos(a2)*0.20,y+0.46+Math.sin(a2)*0.12,0.83,0.14,0.12,0.08,'#FF8844');
        // outer glow ring
        const gp=p(x+0.5,y+0.5,0.9);
        const gr=ctx.createRadialGradient(gp.x,gp.y,4,gp.x,gp.y,30);
        gr.addColorStop(0,'rgba(68,255,200,0.20)');
        gr.addColorStop(1,'rgba(68,255,200,0)');
        ctx.save(); ctx.fillStyle=gr;
        ctx.beginPath(); ctx.arc(gp.x,gp.y,30,0,Math.PI*2); ctx.fill();
        ctx.restore();
      }

    } else if(type==='blackboard') {
      box(x-0.02,y+0.28,0,0.12,0.10,1.40,'#221133');
      box(x+1.12,y+0.28,0,0.12,0.10,1.40,'#221133');
      box(x-0.06,y+0.20,1.40,1.32,0.16,0.08,'#553377');
      const bc=upgraded?tint(m.col,1.4):m.col;
      box(x+0.02,y+0.24,1.48,1.16,0.10,0.80,bc);
      box(x+0.10,y+0.26,1.64,0.22,0.06,0.04,'#EEEEFF');
      box(x+0.44,y+0.26,1.72,0.18,0.06,0.04,'#EEEEFF');
      box(x+0.72,y+0.26,1.60,0.28,0.06,0.04,'#EEEEFF');
      box(x+0.18,y+0.26,1.84,0.50,0.06,0.04,'#AAAACC');
      if(upgraded) {
        // plasma equations — bright glowing lines
        box(x+0.08,y+0.26,1.94,0.70*progress,0.06,0.04,'#FF88FF');
        box(x+0.08,y+0.26,2.02,0.44*progress,0.06,0.04,'#CC44FF');
        // energy orbs orbiting the board
        const oa=gameTime*2.5;
        box(x+0.55+Math.cos(oa)*0.30,y+0.26,2.10+Math.sin(oa*1.3)*0.18,0.10,0.08,0.10,'#FF44FF');
        box(x+0.55+Math.cos(oa+Math.PI)*0.25,y+0.26,2.10+Math.sin(oa*1.3+Math.PI)*0.15,0.08,0.06,0.08,'#AA44FF');
        // large purple glow
        const gp=p(x+0.6,y+0.26,2.2);
        const gr=ctx.createRadialGradient(gp.x,gp.y,5,gp.x,gp.y,40);
        gr.addColorStop(0,'rgba(200,50,255,0.25)');
        gr.addColorStop(1,'rgba(200,50,255,0)');
        ctx.save(); ctx.fillStyle=gr;
        ctx.beginPath(); ctx.arc(gp.x,gp.y,40,0,Math.PI*2); ctx.fill();
        ctx.restore();
      }
    }

    // progress bar
    const barZ=2.10,barW=0.90,bx=x+0.05,by=y+0.40;
    box(bx,by,barZ,barW,0.18,0.10,'#222233');
    if(progress>0) box(bx,by,barZ+0.02,barW*progress,0.18,0.14,INV_COL[tier]);
    const bob=Math.sin(gameTime*3+tier)*0.04;
    box(x+0.40,y+0.32,barZ+0.35+bob,0.20,0.16,0.20,INV_COL[tier]);
  }

  // ── DRAW: FENCE POST ─────────────────────────────────────────────
  function drawFencePost(x,y) {
    box(x,     y,     0, 0.10,0.10,1.10,'#7a5a20');
    box(x-0.05,y,     0.28,0.20,0.06,0.07,'#5a3a10');
    box(x-0.05,y,     0.60,0.20,0.06,0.07,'#5a3a10');
    box(x-0.05,y,     0.85,0.20,0.06,0.06,'#5a3a10');
    box(x+0.02,y+0.02,1.10,0.06,0.06,0.08,'#FFCC66');
  }

  // ── DRAW: SHELF ───────────────────────────────────────────────────
  function drawShelf() {
    const {x,y,w,d}=SHELF;
    box(x,y,0,w,d,0.52,'#5a4010');
    box(x-0.03,y-0.03,0.52,w+0.06,d+0.06,0.08,'#8a6418');
    shelfInventory.forEach((item,i)=>{
      const ox=x+0.12+i*0.42,oy=y+0.18;
      box(ox,oy,0.60,0.28,0.24,0.30,INV_COL[item.tier]);
      box(ox+0.04,oy+0.04,0.90,0.20,0.16,0.06,tint(INV_COL[item.tier],1.5));
    });
    box(x+0.65,y-0.08,0,0.08,0.08,1.50,'#6a4a18');
    box(x+0.44,y-0.15,1.50,0.82,0.12,0.26,'#FFCC44');
    // counter window frame in fence gap
    box(FX2-0.04,GATE_Y1-0.02,0,0.10,0.08,1.10,'#7a5a20');
    box(FX2-0.04,GATE_Y2-0.06,0,0.10,0.08,1.10,'#7a5a20');
  }

  // ── DRAW: FX TEXT ─────────────────────────────────────────────────
  function drawSlapFX(fx) {
    const sp=p(fx.x,fx.y,fx.z),alpha=Math.min(1,Math.max(0,fx.t/0.75));
    ctx.save(); ctx.globalAlpha=alpha; ctx.translate(sp.x,sp.y); ctx.rotate(-0.18);
    ctx.font='bold 22px Impact,Arial Black';
    ctx.strokeStyle='#000'; ctx.lineWidth=3; ctx.strokeText(fx.text,0,0);
    ctx.fillStyle=fx.col; ctx.fillText(fx.text,0,0);
    ctx.restore();
  }

  // ── RENDER ────────────────────────────────────────────────────────
  function render() {
    ctx.fillStyle='#0a0a16'; ctx.fillRect(0,0,cv.width,cv.height);

    // floor tiles (wider range to cover outside area)
    const px=Math.round(player.x),py=Math.round(player.y),R=15;
    const tiles=[];
    for(let gx=px-R;gx<=px+R;gx++) for(let gy=py-R;gy<=py+R;gy++) tiles.push([gx,gy]);
    tiles.sort(([ax,ay],[bx,by])=>(ax+ay)-(bx+by));
    tiles.forEach(([gx,gy])=>tile(gx,gy,tileColor(gx,gy)));

    // depth-sorted drawables
    const drawables=[
      {type:'player',key:player.x+player.y},
      ...MACHINES.map(m=>({type:'machine',m,key:m.x+m.y})),
      {type:'shelf',key:SHELF.x+SHELF.y},
      ...NPCs.map(n=>({type:'npc',n,key:n.x+n.y})),
      ...FENCE_POSTS.map(fp=>({type:'fence',fp,key:fp.x+fp.y})),
    ];
    if(UPG.labBot&&labBotNPC.active) drawables.push({type:'bot',key:labBotNPC.x+labBotNPC.y});
    drawables.sort((a,b)=>a.key-b.key);

    drawables.forEach(d=>{
      if(d.type==='player') {
        const sh=p(player.x+0.44,player.y+0.44,0);
        ctx.fillStyle='rgba(100,200,255,0.14)'; ctx.beginPath();
        ctx.ellipse(sh.x,sh.y,22,10,0,0,Math.PI*2); ctx.fill();
        drawChar(player.x,player.y,'#DDEEFF','#223366','#885533',walkCycle,player.interactAnim,true);
      } else if(d.type==='machine') {
        d.m.locked?drawLockedMachine(d.m):drawMachine(d.m);
      } else if(d.type==='shelf') {
        drawShelf();
      } else if(d.type==='npc') {
        const n=d.n;
        drawChar(n.x,n.y,n.shirt,n.pants,n.hair,n.walkCycle,0,false);
        if(n.state==='going_to_shelf') {
          const bob=Math.abs(Math.sin(gameTime*4))*0.05;
          box(n.x+0.35,n.y+0.26,2.06+bob,0.10,0.10,0.20,'#FFD700');
        }
      } else if(d.type==='fence') {
        drawFencePost(d.fp.x,d.fp.y);
      } else if(d.type==='bot') {
        const bsh=p(labBotNPC.x+0.44,labBotNPC.y+0.44,0);
        ctx.fillStyle='rgba(255,136,34,0.16)'; ctx.beginPath();
        ctx.ellipse(bsh.x,bsh.y,22,10,0,0,Math.PI*2); ctx.fill();
        drawChar(labBotNPC.x,labBotNPC.y,'#FF8822','#3a5522','#2a1a10',labBotNPC.walkCycle,0,false);
      }
    });

    slapFX.forEach(fx=>drawSlapFX(fx));

    // ── NEARBY MACHINE PROMPT ─────────────────────────────────────
    const nearM=getNearestMachine(2.5);
    if(nearM) {
      const pt=p(nearM.x+0.5,nearM.y+0.5,nearM.locked?2.8:3.0);
      ctx.save(); ctx.textAlign='center';
      ctx.strokeStyle='rgba(0,0,0,0.85)'; ctx.lineWidth=3;
      if(nearM.locked) {
        const canAfford=player.money>=nearM.unlockCost;
        const col=canAfford?'#44FF88':'#FF8844';
        ctx.font='bold 14px "Courier New"';
        const txt=`[E] UNLOCK — $${nearM.unlockCost}`;
        ctx.strokeText(txt,pt.x,pt.y);
        ctx.fillStyle=col; ctx.fillText(txt,pt.x,pt.y);
        if(!canAfford) {
          ctx.font='11px "Courier New"';
          ctx.fillStyle='rgba(255,136,68,0.8)';
          const sub=`need $${nearM.unlockCost-player.money} more`;
          ctx.strokeText(sub,pt.x,pt.y+16);
          ctx.fillText(sub,pt.x,pt.y+16);
        }
      } else if(!nearM.upgraded) {
        const canAfford=player.money>=nearM.upgradeCost;
        const col=canAfford?'#FFD700':'#FF8844';
        ctx.font='bold 14px "Courier New"';
        const txt=`[E] UPGRADE — $${nearM.upgradeCost}`;
        ctx.strokeText(txt,pt.x,pt.y);
        ctx.fillStyle=col; ctx.fillText(txt,pt.x,pt.y);
        ctx.font='11px "Courier New"';
        ctx.fillStyle='rgba(255,255,255,0.65)';
        ctx.strokeText(nearM.upgradeDesc,pt.x,pt.y+16);
        ctx.fillText(nearM.upgradeDesc,pt.x,pt.y+16);
      } else {
        ctx.font='11px "Courier New"';
        ctx.fillStyle='rgba(68,255,136,0.8)';
        const txt='UPGRADED ✓  [SPACE] to work';
        ctx.strokeText(txt,pt.x,pt.y);
        ctx.fillText(txt,pt.x,pt.y);
      }
      ctx.restore();
    }

    // ── HUD ──────────────────────────────────────────────────────────
    ctx.textAlign='center'; ctx.font='bold 24px Impact,Arial Black';
    ctx.strokeStyle='rgba(0,0,0,0.9)'; ctx.lineWidth=5;
    ctx.strokeText('MAD SCIENTIST LAB',cv.width/2,32);
    ctx.fillStyle='#88FFCC'; ctx.fillText('MAD SCIENTIST LAB',cv.width/2,32);

    ctx.textAlign='left'; ctx.font='bold 16px "Courier New"';
    ctx.fillStyle='#FFD700'; ctx.fillText(`$ ${player.money}`,12,26);

    // global upgrades panel (auto-buy)
    const panelW=200, rowH=15;
    ctx.fillStyle='rgba(0,0,0,0.48)';
    ctx.fillRect(6,34,panelW,GLOBAL_UPGRADES.length*rowH+10);
    ctx.font='bold 10px "Courier New"';
    GLOBAL_UPGRADES.forEach((u,i)=>{
      const ry=44+i*rowH;
      const done=UPG[u.key];
      if(done) {
        ctx.fillStyle='#44FF88';
        ctx.fillText(`✓ ${u.label}  — ${u.desc}`,12,ry);
      } else {
        ctx.fillStyle=player.money>=u.cost?'#FFFF44':'rgba(255,255,255,0.28)';
        ctx.fillText(`  ${u.label} [$${u.cost}]  ${u.desc}`,12,ry);
      }
    });

    // progress bar toward next global upgrade
    const nextG=GLOBAL_UPGRADES.find(u=>!UPG[u.key]);
    if(nextG) {
      const frac=Math.min(1,player.money/nextG.cost);
      const bx=8,by2=44+GLOBAL_UPGRADES.length*rowH+2,bw=panelW-4;
      ctx.fillStyle='#111122'; ctx.fillRect(bx,by2,bw,4);
      ctx.fillStyle='#44FF88'; ctx.fillRect(bx,by2,bw*frac,4);
    }

    ctx.textAlign='right'; ctx.font='bold 12px "Courier New"';
    ctx.fillStyle=shelfInventory.length===MAX_SHELF?'#FF8844':'#88FFCC';
    ctx.fillText(`SHELF ${shelfInventory.length}/${MAX_SHELF}`,cv.width-12,26);

    ctx.textAlign='center'; ctx.font='11px Segoe UI'; ctx.fillStyle='rgba(255,255,255,0.18)';
    ctx.fillText('WASD move  ·  SPACE work machine  ·  E unlock / upgrade machine',cv.width/2,cv.height-10);
  }

  // ── GAME LOOP ─────────────────────────────────────────────────────
  let lastTime=0;
  function loop(now) {
    const dt=Math.min((now-lastTime)/1000,0.05); lastTime=now; gameTime+=dt;
    for(let i=slapFX.length-1;i>=0;i--){slapFX[i].t-=dt;if(slapFX[i].t<=0)slapFX.splice(i,1);}

    let dx=0,dy=0;
    if(keys['w']||keys['arrowup'])    {dx-=1;dy-=1;}
    if(keys['s']||keys['arrowdown'])  {dx+=1;dy+=1;}
    if(keys['a']||keys['arrowleft'])  {dx-=1;dy+=1;}
    if(keys['d']||keys['arrowright']) {dx+=1;dy-=1;}
    const moving=dx!==0||dy!==0;
    if(moving) {
      const len=Math.sqrt(dx*dx+dy*dy);
      player.x+=(dx/len)*player.speed*dt;
      player.y+=(dy/len)*player.speed*dt;
      walkTimer+=dt; if(walkTimer>0.16){walkTimer=0;walkCycle=1-walkCycle;}
    } else { walkCycle=0; }

    // clamp player inside lab
    player.x=Math.max(LAB.x1,Math.min(LAB.x2,player.x));
    player.y=Math.max(LAB.y1,Math.min(LAB.y2,player.y));

    if(pendingWork){tryWork();pendingWork=false;}
    if(pendingBuy){tryBuy();pendingBuy=false;}
    updateMachines(dt);
    updateLabBot(dt);
    updateNPCs(dt);
    checkGlobalUpgrades();

    render();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
