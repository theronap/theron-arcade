<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mad Scientist Lab</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0a0a16; display:flex; height:100vh; overflow:hidden; }
    #ad-left, #ad-right {
      width:160px; min-width:160px; background:#0a0a16;
      border-right:1px solid #1a1a2e; display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:12px; padding:8px;
    }
    #ad-right { border-right:none; border-left:1px solid #1a1a2e; }
    .ad-slot {
      width:144px; background:#0f0f20; border:1px solid #22224a;
      color:#33335a; font:11px/1.5 'Courier New'; text-align:center;
      padding:10px 6px; border-radius:3px;
    }
    .ad-slot.tall { height:580px; display:flex; align-items:center; justify-content:center; }
    canvas { flex:1; display:block; min-width:300px; }
    @media (max-width:700px) { #ad-left,#ad-right { display:none; } }
  </style>
</head>
<body>
<div id="ad-left"><div class="ad-slot tall">AD SPACE<br>160 × 600</div></div>
<canvas id="c"></canvas>
<div id="ad-right"><div class="ad-slot tall">AD SPACE<br>160 × 600</div></div>

<script>
(() => {
  const cv = document.getElementById('c');
  const ctx = cv.getContext('2d');
  function resize() { cv.width=cv.offsetWidth; cv.height=cv.offsetHeight; }
  window.addEventListener('resize', resize); resize();

  // ── ISOMETRIC RENDERER ──────────────────────────────────────────
  const TW=64, TH=32;
  function p(x,y,z=0) {
    const cx=player.x+0.44, cy=player.y+0.35;
    return { x:cv.width/2+(x-cx-(y-cy))*(TW/2), y:cv.height/2+(x-cx+(y-cy))*(TH/2)-z*TH+20 };
  }
  function tint(hex,f) {
    const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
    return `rgb(${Math.round(r*f)},${Math.round(g*f)},${Math.round(b*f)})`;
  }
  function poly(pts,col,edge='rgba(0,0,0,0.09)') {
    ctx.beginPath(); pts.forEach((q,i)=>i?ctx.lineTo(q.x,q.y):ctx.moveTo(q.x,q.y));
    ctx.closePath(); ctx.fillStyle=col; ctx.fill();
    if(edge){ctx.strokeStyle=edge;ctx.lineWidth=0.7;ctx.stroke();}
  }
  function box(x,y,z,w,d,h,col) {
    poly([p(x,y,z+h),p(x+w,y,z+h),p(x+w,y+d,z+h),p(x,y+d,z+h)],tint(col,1.00));
    poly([p(x,y+d,z),p(x+w,y+d,z),p(x+w,y+d,z+h),p(x,y+d,z+h)],tint(col,0.68));
    poly([p(x+w,y,z),p(x+w,y+d,z),p(x+w,y+d,z+h),p(x+w,y,z+h)],tint(col,0.50));
  }
  function tile(gx,gy,col) {
    poly([p(gx,gy),p(gx+1,gy),p(gx+1,gy+1),p(gx,gy+1)],col,'rgba(0,0,0,0.06)');
  }
  function tileColor(gx,gy) {
    if(((gx%8)+8)%8===0&&((gy%8)+8)%8===0) return '#2a2a3a';
    return (gx+gy)%2===0?'#1e1e2c':'#1a1a28';
  }

  // ── PALETTES ─────────────────────────────────────────────────────
  const SHIRTS=['#4488EE','#44AA55','#CC8833','#AA44CC','#33AACC','#EE8833','#BB3366','#33CCAA'];
  const HAIRS =['#1a1a44','#5a3320','#222244','#3a2010','#1a3a1a','#4a2020','#2a1a44','#1a4a3a'];
  const PANTSC=['#442222','#224422','#222244','#442244','#224444'];

  // ── INVENTION DATA ────────────────────────────────────────────────
  const INV_NAMES={
    1:['Fizzy Widget','Spark Cube','Wobble Coil','Buzz Flask','Zing Rod'],
    2:['Quantum Donut','Vortex Plate','Hum Device','Spin Lens','Phase Gear'],
    3:['Hyper Node','Void Crystal','Flux Engine','Dark Module','Omega Cell'],
  };
  const INV_COL ={1:'#FFD700',2:'#44CCFF',3:'#FF44CC'};
  const INV_SELL={1:[2,4],   2:[8,14],   3:[20,35]};

  // ── LAB BOUNDS ────────────────────────────────────────────────────
  const LAB={x1:-7.5,y1:-3.5,x2:-0.2,y2:3.5};
  const FX1=-7.9, FY1=-3.9, FX2=0.5, FY2=3.9;
  const GATE_Y1=-0.8, GATE_Y2=0.6;

  const FENCE_POSTS=[];
  (function(){
    const S=1.2;
    for(let fy=FY1;fy<=FY2+0.01;fy+=S){
      if(fy>=GATE_Y1-0.1&&fy<=GATE_Y2+0.1) continue;
      FENCE_POSTS.push({x:FX2,y:fy});
    }
    for(let fy=FY1;fy<=FY2+0.01;fy+=S) FENCE_POSTS.push({x:FX1,y:fy});
    for(let fx=FX1+S;fx<FX2;fx+=S) FENCE_POSTS.push({x:fx,y:FY1});
    for(let fx=FX1+S;fx<FX2;fx+=S) FENCE_POSTS.push({x:fx,y:FY2});
  })();

  // ── MACHINES ─────────────────────────────────────────────────────
  // TODO(pacing): slow tier speeds significantly for real play; higher tiers
  // should feel dramatically slower. Current speeds are fast for dev only.
  const MACHINES=[
    { x:-6,y:-2,type:'flask',      tier:1,baseSpeed:0.030,col:'#1e4477',progress:0,
      locked:false,unlockCost:0,   upgraded:false,upgradeCost:40,
      upgradeType:null, broken:false,brokenTimer:0 },
    { x:-6,y: 0,type:'centrifuge', tier:2,baseSpeed:0.015,col:'#1a4433',progress:0,
      locked:true, unlockCost:60,  upgraded:false,upgradeCost:150,
      upgradeType:null, broken:false,brokenTimer:0 },
    { x:-6,y: 2,type:'blackboard', tier:3,baseSpeed:0.008,col:'#3a1a55',progress:0,
      locked:true, unlockCost:220, upgraded:false,upgradeCost:500,
      upgradeType:null, broken:false,brokenTimer:0 },
  ];

  // ── SHOP SHELF ────────────────────────────────────────────────────
  const SHELF={x:1.5,y:-0.6,w:2.2,d:1.0};
  const MAX_SHELF=5;
  const shelfInventory=[];

  // ── GLOBAL UPGRADES ───────────────────────────────────────────────
  const UPG={conveyor:false,labBot:false,marketingBot:false,robotFactory:false};
  const GLOBAL_UPGRADES=[
    {key:'conveyor',    cost:80,  label:'CONVEYOR',  desc:'auto-fill shelf'},
    {key:'labBot',      cost:120, label:'LAB BOT',   desc:'bot assists machines'},
    {key:'marketingBot',cost:200, label:'MARKETING', desc:'2× customer rate'},
    {key:'robotFactory',cost:500, label:'FACTORY',   desc:'bonus t1 every 10s'},
  ];

  // ── LAB BOT ───────────────────────────────────────────────────────
  const labBotNPC={x:-4,y:-3,active:false,walkCycle:0,walkTimer:0};

  // ── FAME / REPUTATION (0–100) ─────────────────────────────────────
  let fame=0;

  // ── VIP CUSTOMER SYSTEM ───────────────────────────────────────────
  let vipTimer=0, vipInterval=55.0, vipNPC=null;
  // vipNPC: {x,y,wantsTier,countdown,timeLimit,walkCycle,walkTimer,state}

  // ── UPGRADE PROMPT (branching choice) ────────────────────────────
  let upgradePrompt=null; // {machine} shown when E pressed near upgradeable machine

  // ── WIN / PRESTIGE ────────────────────────────────────────────────
  const soldCount={1:0,2:0,3:0};
  const WIN_TARGETS={1:5,2:3,3:2};
  let prestigeLevel=0, prestigeMult=1.0, winAchieved=false;

  // ── SPAWNING ──────────────────────────────────────────────────────
  let customerInterval=8.0, customerTimer=0;

  // ── PLAYER ────────────────────────────────────────────────────────
  const player={x:-3,y:0,speed:4,money:0,interactAnim:0};
  let walkCycle=0,walkTimer=0,gameTime=0;

  // ── MISC ──────────────────────────────────────────────────────────
  const slapFX=[],NPCs=[];
  let robotTimer=0;

  // ── INPUT ─────────────────────────────────────────────────────────
  const keys={};
  let pendingWork=false,pendingBuy=false,spaceDown=false;
  let pending1=false,pending2=false,pendingPrestige=false;
  window.addEventListener('keydown',e=>{
    const k=e.key.toLowerCase();
    if(['w','a','s','d','arrowup','arrowdown','arrowleft','arrowright',' ','e','1','2','p'].includes(k)) e.preventDefault();
    if(k===' '){if(!spaceDown){spaceDown=true;pendingWork=true;}}
    if(k==='e') pendingBuy=true;
    if(k==='1') pending1=true;
    if(k==='2') pending2=true;
    if(k==='p') pendingPrestige=true;
    keys[k]=true;
  });
  window.addEventListener('keyup',e=>{
    keys[e.key.toLowerCase()]=false;
    if(e.key===' ') spaceDown=false;
  });

  // ── NPC FACTORY ───────────────────────────────────────────────────
  function makeCustomer() {
    const i=~~(Math.random()*SHIRTS.length);
    return {
      x:2+Math.random()*9, y:-6+Math.random()*12,
      shirt:SHIRTS[i],hair:HAIRS[i],pants:PANTSC[~~(Math.random()*PANTSC.length)],
      state:'wandering',stateTimer:Math.random()*2,
      targetX:2+Math.random()*8, targetY:-4+Math.random()*8,
      walkCycle:0,walkTimer:0,speed:1.3+Math.random()*0.4,
    };
  }
  function initNPCs(){NPCs.length=0;for(let i=0;i<3;i++) NPCs.push(makeCustomer());}
  initNPCs();

  // ── MACHINE COMPLETION ────────────────────────────────────────────
  function completeMachine(m) {
    m.progress=0;
    const [lo,hi]=INV_SELL[m.tier];
    const baseVal=lo+~~(Math.random()*(hi-lo+1));
    // quality upgrade: 1.8× sell value
    const sellVal = (m.upgraded && m.upgradeType==='quality') ? Math.round(baseVal*1.8) : baseVal;
    const name=INV_NAMES[m.tier][~~(Math.random()*INV_NAMES[m.tier].length)];
    slapFX.push({x:m.x+0.3,y:m.y,z:2.5,t:1.5,text:'DONE!',col:INV_COL[m.tier]});
    if(shelfInventory.length<MAX_SHELF) {
      shelfInventory.push({tier:m.tier,name,sellVal});
    } else {
      const half=Math.floor(sellVal/2);
      player.money+=half;
      slapFX.push({x:m.x,y:m.y-0.3,z:2.0,t:1.0,text:`+$${half} (full)`,col:'#FFAA44'});
    }
  }

  // ── MACHINE UPDATE ────────────────────────────────────────────────
  function updateMachines(dt) {
    MACHINES.forEach(m=>{
      if(m.locked||m.broken) return;
      // speed upgrade: 1.8× faster
      const speedMult=(m.upgraded&&m.upgradeType==='speed')?1.8:1.0;
      m.progress=Math.min(1,m.progress+m.baseSpeed*speedMult*prestigeMult*dt);
      if(m.progress>=1) completeMachine(m);
      // random breakdown: ~2% chance per 10s of active operation
      if(m.progress>0.15&&Math.random()<0.002*dt*60) {
        m.broken=true; m.brokenTimer=0;
        slapFX.push({x:m.x+0.4,y:m.y,z:2.8,t:2.0,text:'⚠ BROKEN!',col:'#FF4444'});
      }
    });
    if(UPG.robotFactory){
      robotTimer+=dt;
      if(robotTimer>=10){
        robotTimer=0;
        const t1=MACHINES.find(m=>m.tier===1&&!m.locked&&!m.broken);
        if(t1&&t1.progress<1){t1.progress=1;completeMachine(t1);}
      }
    }
    // auto-fix broken machines after 45s (with progress penalty)
    MACHINES.forEach(m=>{
      if(m.broken){
        m.brokenTimer+=dt;
        if(m.brokenTimer>=45){m.broken=false;m.brokenTimer=0;m.progress*=0.5;}
      }
    });
  }

  // ── LAB BOT UPDATE ────────────────────────────────────────────────
  function updateLabBot(dt) {
    if(!UPG.labBot||!labBotNPC.active) return;
    let target=null,highP=-1;
    MACHINES.forEach(m=>{if(!m.locked&&!m.broken&&m.progress>highP&&m.progress<1){highP=m.progress;target=m;}});
    if(!target) return;
    const tx=target.x+0.5,ty=target.y+0.5;
    const ddx=tx-labBotNPC.x,ddy=ty-labBotNPC.y,dd=Math.sqrt(ddx*ddx+ddy*ddy);
    if(dd>1.2){
      labBotNPC.x+=ddx/dd*2.2*dt; labBotNPC.y+=ddy/dd*2.2*dt;
      labBotNPC.walkTimer+=dt;
      if(labBotNPC.walkTimer>0.18){labBotNPC.walkTimer=0;labBotNPC.walkCycle=1-labBotNPC.walkCycle;}
    } else {
      const sm=(target.upgraded&&target.upgradeType==='speed')?1.8:1.0;
      target.progress=Math.min(1,target.progress+0.08*sm*prestigeMult*dt);
    }
  }

  // ── VIP UPDATE ────────────────────────────────────────────────────
  function updateVIP(dt) {
    vipTimer+=dt;
    // spawn VIP if interval elapsed and no VIP active and some machines unlocked
    if(!vipNPC && vipTimer>=vipInterval && MACHINES.some(m=>!m.locked)) {
      vipTimer=0;
      const availableTiers=MACHINES.filter(m=>!m.locked).map(m=>m.tier);
      const wantsTier=availableTiers[~~(Math.random()*availableTiers.length)];
      vipNPC={
        x:4+Math.random()*4, y:-3+Math.random()*6,
        wantsTier, countdown:28, timeLimit:28,
        walkCycle:0,walkTimer:0,speed:1.8,state:'going_to_shelf',
      };
      slapFX.push({x:SHELF.x+1,y:SHELF.y-0.5,z:2.2,t:2.5,
        text:`VIP WANTS TIER ${wantsTier}!`,col:INV_COL[wantsTier]});
    }
    if(!vipNPC) return;

    vipNPC.countdown-=dt;
    if(vipNPC.countdown<=0){
      slapFX.push({x:SHELF.x+1,y:SHELF.y,z:2.0,t:1.5,text:'VIP LEFT!',col:'#FF4444'});
      vipNPC=null; return;
    }

    if(vipNPC.state==='going_to_shelf') {
      if(shelfInventory.length===0){vipNPC.state='wandering';return;}
      const tx=SHELF.x+SHELF.w*.5,ty=SHELF.y+SHELF.d*.5;
      const ddx=tx-vipNPC.x,ddy=ty-vipNPC.y,dd=Math.sqrt(ddx*ddx+ddy*ddy);
      if(dd<0.9){
        // check if wanted tier is on shelf
        const idx=shelfInventory.findIndex(i=>i.tier===vipNPC.wantsTier);
        if(idx>=0){
          const item=shelfInventory.splice(idx,1)[0];
          const bonus=Math.round(item.sellVal*4);
          player.money+=bonus;
          fame=Math.min(100,fame+12);
          soldCount[item.tier]=(soldCount[item.tier]||0)+1;
          slapFX.push({x:SHELF.x+1,y:SHELF.y-0.2,z:2.2,t:2.0,text:`VIP +$${bonus}!!`,col:'#FFD700'});
          checkWin();
        } else {
          slapFX.push({x:SHELF.x+1,y:SHELF.y,z:2.0,t:1.5,text:'VIP: wrong tier!',col:'#FF8844'});
        }
        vipNPC=null;
      } else {
        vipNPC.x+=ddx/dd*vipNPC.speed*dt; vipNPC.y+=ddy/dd*vipNPC.speed*dt;
        vipNPC.walkTimer+=dt;
        if(vipNPC.walkTimer>0.16){vipNPC.walkTimer=0;vipNPC.walkCycle=1-vipNPC.walkCycle;}
      }
    }
  }

  // ── GET NEAREST MACHINE ───────────────────────────────────────────
  function getNearestMachine(maxDist) {
    let nearest=null,nearD=Infinity;
    MACHINES.forEach(m=>{
      const ddx=m.x+0.5-(player.x+0.44),ddy=m.y+0.5-(player.y+0.35);
      const d=Math.sqrt(ddx*ddx+ddy*ddy);
      if(d<maxDist&&d<nearD){nearest=m;nearD=d;}
    });
    return nearest;
  }

  // ── WORK (SPACE) ──────────────────────────────────────────────────
  function tryWork() {
    player.interactAnim=0.35;
    const m=getNearestMachine(2.2);
    if(!m||m.locked||m.broken) return;
    const sm=(m.upgraded&&m.upgradeType==='speed')?1.8:1.0;
    m.progress=Math.min(1,m.progress+0.14*sm*prestigeMult);
    slapFX.push({x:m.x+0.3,y:m.y,z:2.1,t:0.5,text:'⚗',col:'#88FFCC'});
  }

  // ── BUY/UNLOCK/FIX (E) ────────────────────────────────────────────
  function tryBuy() {
    const m=getNearestMachine(2.5);
    if(!m) return;
    if(m.broken) {
      m.broken=false; m.brokenTimer=0;
      slapFX.push({x:m.x+0.5,y:m.y,z:2.8,t:1.5,text:'FIXED!',col:'#88FFCC'});
      return;
    }
    if(m.locked) {
      if(player.money>=m.unlockCost){
        player.money-=m.unlockCost; m.locked=false;
        slapFX.push({x:m.x+0.5,y:m.y,z:3.0,t:2.5,text:'UNLOCKED!',col:'#88FFCC'});
      } else {
        slapFX.push({x:m.x+0.5,y:m.y,z:2.8,t:1.5,text:`Need $${m.unlockCost-player.money} more`,col:'#FF6644'});
      }
      return;
    }
    if(!m.upgraded) {
      // show branching prompt; actual purchase via 1/2 keys
      upgradePrompt={machine:m};
    }
  }

  // ── UPGRADE CHOICE (1=speed, 2=quality) ──────────────────────────
  function tryUpgradeChoice(type) {
    if(!upgradePrompt) return;
    const m=upgradePrompt.machine;
    if(player.money>=m.upgradeCost){
      player.money-=m.upgradeCost;
      m.upgraded=true; m.upgradeType=type;
      const label=type==='speed'?'SPEED UPGRADE!':'QUALITY UPGRADE!';
      const col=type==='speed'?'#44CCFF':'#FFD700';
      slapFX.push({x:m.x+0.5,y:m.y,z:3.0,t:2.5,text:label,col});
    } else {
      slapFX.push({x:m.x+0.5,y:m.y,z:2.8,t:1.5,text:`Need $${m.upgradeCost-player.money} more`,col:'#FF6644'});
    }
    upgradePrompt=null;
  }

  // ── NPC UPDATE ────────────────────────────────────────────────────
  function updateNPCs(dt) {
    // customer interval scales with fame (8s → 4s at max fame)
    const effInterval=customerInterval-(fame/100)*4;
    customerTimer+=dt;
    if(customerTimer>=effInterval&&NPCs.length<10){
      customerTimer=0; NPCs.push(makeCustomer());
    }
    NPCs.forEach(n=>{
      if(n.state==='wandering'&&Math.abs(n.x-6)>18){
        n.x=3+Math.random()*7; n.y=-4+Math.random()*8;
        n.targetX=n.x+(Math.random()-.5)*5; n.targetY=n.y+(Math.random()-.5)*5;
      }
      if(n.state==='wandering'){
        const ddx=n.targetX-n.x,ddy=n.targetY-n.y,dd=Math.sqrt(ddx*ddx+ddy*ddy);
        if(dd<0.3){
          n.state='waiting'; n.stateTimer=1.0+Math.random()*1.5; n.walkCycle=0;
        } else {
          n.x+=ddx/dd*n.speed*dt; n.y+=ddy/dd*n.speed*dt;
          n.walkTimer+=dt; if(n.walkTimer>0.20){n.walkTimer=0;n.walkCycle=1-n.walkCycle;}
          if(n.x<FX2+0.4){n.x=FX2+0.4;n.targetX=FX2+1.5+Math.random()*4;}
        }
      } else if(n.state==='waiting'){
        n.stateTimer-=dt;
        if(n.stateTimer<=0){
          if(shelfInventory.length>0&&Math.random()<0.7){n.state='going_to_shelf';}
          else{n.targetX=3+Math.random()*6;n.targetY=-3+Math.random()*6;n.state='wandering';}
        }
      } else if(n.state==='going_to_shelf'){
        if(shelfInventory.length===0){n.state='wandering';return;}
        const tx=SHELF.x+SHELF.w*.5,ty=SHELF.y+SHELF.d*.5;
        const ddx=tx-n.x,ddy=ty-n.y,dd=Math.sqrt(ddx*ddx+ddy*ddy);
        if(dd<0.9){n.state='buying';n.stateTimer=1.0+Math.random()*0.5;n.walkCycle=0;}
        else{
          n.x+=ddx/dd*n.speed*dt; n.y+=ddy/dd*n.speed*dt;
          n.walkTimer+=dt; if(n.walkTimer>0.20){n.walkTimer=0;n.walkCycle=1-n.walkCycle;}
        }
      } else if(n.state==='buying'){
        n.stateTimer-=dt;
        if(n.stateTimer<=0){
          if(shelfInventory.length>0){
            const item=shelfInventory.shift();
            // fame bonus on sell price
            const fameBonus=1+(fame/200);
            const earned=Math.round(item.sellVal*fameBonus);
            player.money+=earned;
            fame=Math.min(100,fame+item.sellVal*0.3);
            soldCount[item.tier]=(soldCount[item.tier]||0)+1;
            slapFX.push({x:SHELF.x+SHELF.w*.5,y:SHELF.y,z:2.0,t:1.4,text:`+$${earned}`,col:'#FFD700'});
            checkWin();
          }
          n.state='wandering';
          n.targetX=3+Math.random()*6; n.targetY=-3+Math.random()*6;
        }
      }
    });
    player.interactAnim=Math.max(0,player.interactAnim-dt*3);
  }

  // ── WIN CHECK ─────────────────────────────────────────────────────
  function checkWin() {
    if(winAchieved) return;
    if(soldCount[1]>=WIN_TARGETS[1]&&soldCount[2]>=WIN_TARGETS[2]&&soldCount[3]>=WIN_TARGETS[3]){
      winAchieved=true;
    }
  }

  // ── GLOBAL UPGRADE CHECK ─────────────────────────────────────────
  function checkGlobalUpgrades() {
    for(const u of GLOBAL_UPGRADES){
      if(UPG[u.key]) continue;
      if(player.money>=u.cost){
        player.money-=u.cost; UPG[u.key]=true;
        if(u.key==='labBot'){labBotNPC.active=true;labBotNPC.x=-4;labBotNPC.y=-1;}
        if(u.key==='marketingBot') customerInterval=4.0;
        slapFX.push({x:player.x,y:player.y-0.8,z:2.8,t:2.5,text:`${u.label} UNLOCKED!`,col:'#88FFCC'});
        break;
      }
    }
  }

  // ── PRESTIGE ──────────────────────────────────────────────────────
  function doPrestige() {
    prestigeLevel++;
    prestigeMult=1.0+prestigeLevel*0.35;
    // reset but keep prestige state
    player.x=-3;player.y=0;player.money=0;player.interactAnim=0;
    GLOBAL_UPGRADES.forEach(u=>UPG[u.key]=false);
    MACHINES[0].baseSpeed=0.030;MACHINES[1].baseSpeed=0.015;MACHINES[2].baseSpeed=0.008;
    MACHINES.forEach(m=>{m.progress=0;m.locked=(m.tier>1);m.upgraded=false;m.upgradeType=null;m.broken=false;m.brokenTimer=0;});
    shelfInventory.length=0;slapFX.length=0;NPCs.length=0;
    customerInterval=8.0;customerTimer=0;robotTimer=0;vipNPC=null;vipTimer=0;
    labBotNPC.active=false;labBotNPC.x=-4;labBotNPC.y=-3;
    fame=0; winAchieved=false; upgradePrompt=null;
    soldCount[1]=0;soldCount[2]=0;soldCount[3]=0;
    initNPCs();
    slapFX.push({x:player.x,y:player.y,z:3.5,t:3.0,text:`PRESTIGE ${prestigeLevel}! +${Math.round((prestigeMult-1)*100)}% speed`,col:'#FFD700'});
  }

  // ── DRAW: CHARACTER ───────────────────────────────────────────────
  function drawChar(cx,cy,shirt,pants,hair,wk,anim=0,badge=false,crown=false) {
    const sk='#F2B87A',shoe='#181828';
    const lz=wk===1?0.06:0,rz=wk===0?0.06:0;
    const swing=anim>0?Math.sin((1-anim/0.35)*Math.PI):0;
    const armDY=-0.28*swing,armDZ=0.42*swing;
    box(cx-0.24,cy+0.14,0.62,0.20,0.34,0.34,shirt);
    box(cx-0.24,cy+0.14,0.22,0.20,0.34,0.40,sk);
    box(cx+0.08,cy+0.04,0,0.29,0.50,0.13,shoe);
    box(cx+0.51,cy+0.04,0,0.29,0.50,0.13,shoe);
    box(cx+0.10,cy+0.08,0.13+lz,0.27,0.42,0.43,pants);
    box(cx+0.51,cy+0.08,0.13+rz,0.27,0.42,0.43,pants);
    box(cx+0.02,cy+0.03,0.56,0.84,0.72,0.58,shirt);
    if(badge) box(cx+0.54,cy+0.70,0.88,0.14,0.06,0.14,'#FFD700');
    box(cx+0.13,cy+0.13,1.14,0.60,0.54,0.60,sk);
    box(cx+0.13,cy+0.13,1.74,0.60,0.54,0.14,hair);
    box(cx+0.22,cy+0.66,1.44,0.14,0.025,0.14,'#0a0a1c');
    box(cx+0.50,cy+0.66,1.44,0.14,0.025,0.14,'#0a0a1c');
    box(cx+0.86,cy+0.12+armDY,0.62+armDZ,0.20,0.34,0.34,shirt);
    box(cx+0.86,cy+0.12+armDY,0.22+armDZ,0.20,0.34,0.40,sk);
    if(crown) {
      box(cx+0.18,cy+0.18,1.88,0.50,0.40,0.12,'#FFD700');
      box(cx+0.20,cy+0.20,2.00,0.14,0.08,0.14,'#FFD700');
      box(cx+0.36,cy+0.20,2.00,0.14,0.08,0.20,'#FFD700');
      box(cx+0.52,cy+0.20,2.00,0.14,0.08,0.14,'#FFD700');
    }
  }

  // ── DRAW: LOCKED MACHINE ──────────────────────────────────────────
  function drawLockedMachine(m) {
    const {x,y}=m;
    box(x-0.05,y-0.05,0,1.3,1.1,1.6,'#1a1218');
    box(x,y,1.6,1.2,1.0,0.10,'#2a1a28');
    box(x+0.02,y+0.02,0.5,1.16,0.96,0.08,'#332233');
    box(x+0.38,y+0.25,1.71,0.44,0.06,0.32,'#EED044');
    box(x+0.42,y+0.27,2.03,0.36,0.04,0.04,'#CC9900');
    box(x+0.52,y+0.27,1.76,0.20,0.04,0.16,'#2a1a28');
    box(x+0.52,y+0.27,1.92,0.20,0.04,0.08,'#2a1a28');
  }

  // ── DRAW: ACTIVE MACHINE ──────────────────────────────────────────
  function drawMachine(m) {
    const {x,y,type,tier,progress,upgraded,upgradeType,broken}=m;

    // broken: red pulsing overlay
    if(broken) {
      const pulse=0.5+Math.sin(gameTime*8)*0.3;
      const gp=p(x+0.5,y+0.45,1.0);
      ctx.save(); ctx.globalAlpha=pulse*0.45;
      ctx.fillStyle='#FF2200';
      ctx.beginPath(); ctx.arc(gp.x,gp.y,30,0,Math.PI*2); ctx.fill();
      ctx.restore();
    }

    if(type==='flask') {
      const fc=upgraded?tint(m.col,1.6):m.col;
      if(upgraded&&upgradeType==='quality') {
        const gp=p(x+0.5,y+0.45,0.8);
        const gr=ctx.createRadialGradient(gp.x,gp.y,3,gp.x,gp.y,36);
        gr.addColorStop(0,'rgba(255,215,0,0.30)'); gr.addColorStop(1,'rgba(255,215,0,0)');
        ctx.save(); ctx.fillStyle=gr; ctx.beginPath(); ctx.arc(gp.x,gp.y,36,0,Math.PI*2); ctx.fill(); ctx.restore();
      } else if(upgraded&&upgradeType==='speed') {
        const gp=p(x+0.5,y+0.45,0.8);
        const gr=ctx.createRadialGradient(gp.x,gp.y,3,gp.x,gp.y,36);
        gr.addColorStop(0,'rgba(102,255,200,0.30)'); gr.addColorStop(1,'rgba(102,255,200,0)');
        ctx.save(); ctx.fillStyle=gr; ctx.beginPath(); ctx.arc(gp.x,gp.y,36,0,Math.PI*2); ctx.fill(); ctx.restore();
      }
      box(x,y,0,1.0,0.9,0.50,fc);
      box(x+0.20,y+0.10,0.50,0.60,0.55,0.38,tint(fc,1.35));
      box(x+0.36,y+0.26,0.88,0.28,0.26,0.56,tint(fc,0.75));
      box(x+0.30,y+0.20,1.44,0.40,0.34,0.16,'#66FFCC');
      if(progress>0.1&&!broken) {
        const bx=x+0.42+Math.sin(gameTime*4)*0.06, bz=1.62+Math.sin(gameTime*6+1)*0.08;
        box(bx,y+0.30,bz,0.10,0.08,0.10,'#AAFFEE');
        if(upgraded) {
          box(bx-0.16,y+0.34,bz+0.02,0.08,0.06,0.08,'#66FFCC');
          box(bx+0.18,y+0.28,bz+0.05,0.07,0.05,0.09,'#AAFFCC');
        }
      }
      if(broken) {
        box(x+0.40,y+0.35,1.60,0.20,0.16,0.30,'#FF4400');
        box(x+0.44,y+0.38,1.90,0.12,0.10,0.12,'#FF8800');
      }
    } else if(type==='centrifuge') {
      const cc=upgraded?tint(m.col,1.5):m.col;
      box(x,y,0,1.0,1.0,0.48,'#112233');
      box(x+0.06,y+0.06,0.48,0.88,0.88,0.20,cc);
      box(x+0.26,y+0.26,0.68,0.48,0.48,0.14,tint(cc,1.6));
      const spinRate=(upgraded&&upgradeType==='speed')?8:2;
      const a=gameTime*(broken?0:spinRate+progress*4);
      box(x+0.44+Math.cos(a)*0.20,y+0.46+Math.sin(a)*0.12,0.83,0.14,0.12,0.08,'#AAFFDD');
      if(upgraded&&upgradeType==='speed') {
        const a2=a+Math.PI;
        box(x+0.44+Math.cos(a2)*0.20,y+0.46+Math.sin(a2)*0.12,0.83,0.14,0.12,0.08,'#FF8844');
      } else if(upgraded&&upgradeType==='quality') {
        box(x+0.44+Math.cos(a)*0.20,y+0.46+Math.sin(a)*0.12,0.90,0.10,0.09,0.18,'#FFD700');
      }
    } else if(type==='blackboard') {
      box(x-0.02,y+0.28,0,0.12,0.10,1.40,'#221133');
      box(x+1.12,y+0.28,0,0.12,0.10,1.40,'#221133');
      box(x-0.06,y+0.20,1.40,1.32,0.16,0.08,'#553377');
      const bc=upgraded?tint(m.col,1.4):m.col;
      box(x+0.02,y+0.24,1.48,1.16,0.10,0.80,bc);
      box(x+0.10,y+0.26,1.64,0.22,0.06,0.04,'#EEEEFF');
      box(x+0.44,y+0.26,1.72,0.18,0.06,0.04,'#EEEEFF');
      box(x+0.72,y+0.26,1.60,0.28,0.06,0.04,'#EEEEFF');
      box(x+0.18,y+0.26,1.84,0.50,0.06,0.04,'#AAAACC');
      if(upgraded&&upgradeType==='speed') {
        box(x+0.08,y+0.26,1.94,0.70*progress,0.06,0.04,'#FF88FF');
        const oa=gameTime*2.5;
        box(x+0.55+Math.cos(oa)*0.30,y+0.26,2.10+Math.sin(oa*1.3)*0.18,0.10,0.08,0.10,'#FF44FF');
      } else if(upgraded&&upgradeType==='quality') {
        box(x+0.08,y+0.26,1.94,0.70*progress,0.06,0.04,'#FFD700');
        const oa=gameTime*1.8;
        box(x+0.55+Math.cos(oa)*0.28,y+0.26,2.10+Math.sin(oa)*0.14,0.10,0.08,0.10,'#FFD700');
        box(x+0.55+Math.cos(oa+Math.PI)*0.24,y+0.26,2.10+Math.sin(oa+Math.PI)*0.12,0.08,0.06,0.08,'#FFAA00');
      }
    }

    // progress bar (hide when broken)
    if(!broken) {
      const barZ=2.10,barW=0.90,bx=x+0.05,by=y+0.40;
      box(bx,by,barZ,barW,0.18,0.10,'#222233');
      if(progress>0) box(bx,by,barZ+0.02,barW*progress,0.18,0.14,INV_COL[tier]);
      const bob=Math.sin(gameTime*3+tier)*0.04;
      box(x+0.40,y+0.32,barZ+0.35+bob,0.20,0.16,0.20,INV_COL[tier]);
    } else {
      // wrench indicator
      const bob=Math.abs(Math.sin(gameTime*4))*0.06;
      box(x+0.35,y+0.36,2.60+bob,0.14,0.11,0.22,'#FF8800');
    }
  }

  // ── DRAW: FENCE POST ─────────────────────────────────────────────
  function drawFencePost(x,y) {
    box(x,y,0,0.10,0.10,1.10,'#7a5a20');
    box(x-0.05,y,0.28,0.20,0.06,0.07,'#5a3a10');
    box(x-0.05,y,0.60,0.20,0.06,0.07,'#5a3a10');
    box(x-0.05,y,0.85,0.20,0.06,0.06,'#5a3a10');
    box(x+0.02,y+0.02,1.10,0.06,0.06,0.08,'#FFCC66');
  }

  // ── DRAW: SHELF ───────────────────────────────────────────────────
  function drawShelf() {
    const {x,y,w,d}=SHELF;
    box(x,y,0,w,d,0.52,'#5a4010');
    box(x-0.03,y-0.03,0.52,w+0.06,d+0.06,0.08,'#8a6418');
    shelfInventory.forEach((item,i)=>{
      const ox=x+0.12+i*0.42,oy=y+0.18;
      box(ox,oy,0.60,0.28,0.24,0.30,INV_COL[item.tier]);
      box(ox+0.04,oy+0.04,0.90,0.20,0.16,0.06,tint(INV_COL[item.tier],1.5));
    });
    box(x+0.65,y-0.08,0,0.08,0.08,1.50,'#6a4a18');
    box(x+0.44,y-0.15,1.50,0.82,0.12,0.26,'#FFCC44');
    box(FX2-0.04,GATE_Y1-0.02,0,0.10,0.08,1.10,'#7a5a20');
    box(FX2-0.04,GATE_Y2-0.06,0,0.10,0.08,1.10,'#7a5a20');
  }

  // ── DRAW: FX TEXT ─────────────────────────────────────────────────
  function drawSlapFX(fx) {
    const sp=p(fx.x,fx.y,fx.z),alpha=Math.min(1,Math.max(0,fx.t/0.75));
    ctx.save(); ctx.globalAlpha=alpha; ctx.translate(sp.x,sp.y); ctx.rotate(-0.18);
    ctx.font='bold 22px Impact,Arial Black';
    ctx.strokeStyle='#000'; ctx.lineWidth=3; ctx.strokeText(fx.text,0,0);
    ctx.fillStyle=fx.col; ctx.fillText(fx.text,0,0);
    ctx.restore();
  }

  // ── RENDER ────────────────────────────────────────────────────────
  function render() {
    ctx.fillStyle='#0a0a16'; ctx.fillRect(0,0,cv.width,cv.height);

    const px=Math.round(player.x),py=Math.round(player.y),R=15;
    const tiles=[];
    for(let gx=px-R;gx<=px+R;gx++) for(let gy=py-R;gy<=py+R;gy++) tiles.push([gx,gy]);
    tiles.sort(([ax,ay],[bx,by])=>(ax+ay)-(bx+by));
    tiles.forEach(([gx,gy])=>tile(gx,gy,tileColor(gx,gy)));

    const drawables=[
      {type:'player',key:player.x+player.y},
      ...MACHINES.map(m=>({type:'machine',m,key:m.x+m.y})),
      {type:'shelf',key:SHELF.x+SHELF.y},
      ...NPCs.map(n=>({type:'npc',n,key:n.x+n.y})),
      ...FENCE_POSTS.map(fp=>({type:'fence',fp,key:fp.x+fp.y})),
    ];
    if(UPG.labBot&&labBotNPC.active) drawables.push({type:'bot',key:labBotNPC.x+labBotNPC.y});
    if(vipNPC) drawables.push({type:'vip',key:vipNPC.x+vipNPC.y});
    drawables.sort((a,b)=>a.key-b.key);

    drawables.forEach(d=>{
      if(d.type==='player') {
        const sh=p(player.x+0.44,player.y+0.44,0);
        ctx.fillStyle='rgba(100,200,255,0.14)'; ctx.beginPath();
        ctx.ellipse(sh.x,sh.y,22,10,0,0,Math.PI*2); ctx.fill();
        drawChar(player.x,player.y,'#DDEEFF','#223366','#885533',walkCycle,player.interactAnim,true,false);
      } else if(d.type==='machine') {
        d.m.locked?drawLockedMachine(d.m):drawMachine(d.m);
      } else if(d.type==='shelf') {
        drawShelf();
      } else if(d.type==='npc') {
        const n=d.n;
        drawChar(n.x,n.y,n.shirt,n.pants,n.hair,n.walkCycle,0,false,false);
        if(n.state==='going_to_shelf') {
          const bob=Math.abs(Math.sin(gameTime*4))*0.05;
          box(n.x+0.35,n.y+0.26,2.06+bob,0.10,0.10,0.20,'#FFD700');
        }
      } else if(d.type==='fence') {
        drawFencePost(d.fp.x,d.fp.y);
      } else if(d.type==='bot') {
        const bsh=p(labBotNPC.x+0.44,labBotNPC.y+0.44,0);
        ctx.fillStyle='rgba(255,136,34,0.16)'; ctx.beginPath();
        ctx.ellipse(bsh.x,bsh.y,22,10,0,0,Math.PI*2); ctx.fill();
        drawChar(labBotNPC.x,labBotNPC.y,'#FF8822','#3a5522','#2a1a10',labBotNPC.walkCycle,0,false,false);
      } else if(d.type==='vip') {
        const v=vipNPC;
        const bsh=p(v.x+0.44,v.y+0.44,0);
        ctx.fillStyle='rgba(255,215,0,0.20)'; ctx.beginPath();
        ctx.ellipse(bsh.x,bsh.y,26,12,0,0,Math.PI*2); ctx.fill();
        drawChar(v.x,v.y,'#FFFFFF','#2a2a22','#2a1a44',v.walkCycle,0,false,true);
        // VIP timer bar above head
        const vpt=p(v.x+0.5,v.y+0.5,2.6);
        const frac=v.countdown/v.timeLimit;
        ctx.fillStyle='#333'; ctx.fillRect(vpt.x-22,vpt.y-4,44,6);
        ctx.fillStyle=frac>0.5?'#44FF88':frac>0.25?'#FFAA00':'#FF4444';
        ctx.fillRect(vpt.x-22,vpt.y-4,44*frac,6);
        // wanted tier pip
        const bob=Math.abs(Math.sin(gameTime*5))*0.06;
        box(v.x+0.35,v.y+0.26,2.70+bob,0.14,0.11,0.24,INV_COL[v.wantsTier]);
      }
    });

    slapFX.forEach(fx=>drawSlapFX(fx));

    // ── NEARBY MACHINE PROMPT ─────────────────────────────────────
    const nearM=getNearestMachine(2.5);
    if(nearM&&!winAchieved) {
      const pt=p(nearM.x+0.5,nearM.y+0.5,nearM.locked?2.8:3.2);
      ctx.save(); ctx.textAlign='center';
      ctx.strokeStyle='rgba(0,0,0,0.85)'; ctx.lineWidth=3;
      if(nearM.broken) {
        ctx.font='bold 14px "Courier New"';
        const txt='[E] FIX MACHINE';
        ctx.strokeText(txt,pt.x,pt.y); ctx.fillStyle='#FF8844'; ctx.fillText(txt,pt.x,pt.y);
      } else if(nearM.locked) {
        const canAfford=player.money>=nearM.unlockCost;
        ctx.font='bold 14px "Courier New"';
        const txt=`[E] UNLOCK — $${nearM.unlockCost}`;
        ctx.strokeText(txt,pt.x,pt.y);
        ctx.fillStyle=canAfford?'#44FF88':'#FF8844'; ctx.fillText(txt,pt.x,pt.y);
        if(!canAfford){
          ctx.font='11px "Courier New"'; ctx.fillStyle='rgba(255,136,68,0.8)';
          const sub=`need $${nearM.unlockCost-player.money} more`;
          ctx.strokeText(sub,pt.x,pt.y+16); ctx.fillText(sub,pt.x,pt.y+16);
        }
      } else if(upgradePrompt&&upgradePrompt.machine===nearM) {
        // branching choice
        const canAfford=player.money>=nearM.upgradeCost;
        ctx.font='bold 13px "Courier New"';
        const title=`UPGRADE $${nearM.upgradeCost} — choose:`;
        ctx.strokeText(title,pt.x,pt.y-16);
        ctx.fillStyle=canAfford?'#FFFFFF':'#FF8844'; ctx.fillText(title,pt.x,pt.y-16);
        ctx.font='bold 12px "Courier New"';
        ctx.fillStyle='#44CCFF';
        ctx.strokeText('[1] SPEED — 1.8× faster cycles',pt.x,pt.y+2);
        ctx.fillText('[1] SPEED — 1.8× faster cycles',pt.x,pt.y+2);
        ctx.fillStyle='#FFD700';
        ctx.strokeText('[2] QUALITY — 1.8× sell value',pt.x,pt.y+18);
        ctx.fillText('[2] QUALITY — 1.8× sell value',pt.x,pt.y+18);
      } else if(!nearM.upgraded) {
        const canAfford=player.money>=nearM.upgradeCost;
        ctx.font='bold 14px "Courier New"';
        const txt=`[E] UPGRADE — $${nearM.upgradeCost}`;
        ctx.strokeText(txt,pt.x,pt.y);
        ctx.fillStyle=canAfford?'#FFD700':'#FF8844'; ctx.fillText(txt,pt.x,pt.y);
        ctx.font='11px "Courier New"'; ctx.fillStyle='rgba(255,255,255,0.6)';
        ctx.strokeText('speed or quality — your choice',pt.x,pt.y+16);
        ctx.fillText('speed or quality — your choice',pt.x,pt.y+16);
      } else {
        ctx.font='11px "Courier New"'; ctx.fillStyle='rgba(68,255,136,0.8)';
        const lbl=nearM.upgradeType==='speed'?'SPEED ✓':'QUALITY ✓';
        ctx.strokeText(`${lbl}  [SPACE] to work`,pt.x,pt.y); ctx.fillText(`${lbl}  [SPACE] to work`,pt.x,pt.y);
      }
      ctx.restore();
    }

    // ── HUD ──────────────────────────────────────────────────────────
    ctx.textAlign='center'; ctx.font='bold 24px Impact,Arial Black';
    ctx.strokeStyle='rgba(0,0,0,0.9)'; ctx.lineWidth=5;
    ctx.strokeText('MAD SCIENTIST LAB',cv.width/2,32);
    ctx.fillStyle='#88FFCC'; ctx.fillText('MAD SCIENTIST LAB',cv.width/2,32);

    // money
    ctx.textAlign='left'; ctx.font='bold 16px "Courier New"';
    ctx.fillStyle='#FFD700'; ctx.fillText(`$ ${player.money}`,12,26);

    // fame stars
    const stars=Math.floor(fame/20);
    const partialStar=(fame%20)/20;
    ctx.font='14px Arial'; ctx.fillStyle='#FFD700';
    let starStr='';
    for(let i=0;i<5;i++) starStr+=i<stars?'★':(i===stars&&partialStar>0.3?'✦':'☆');
    ctx.fillText(starStr,12,44);
    ctx.font='9px "Courier New"'; ctx.fillStyle='rgba(255,215,0,0.5)';
    ctx.fillText(`FAME ${Math.floor(fame)}`,12,56);

    // prestige badge
    if(prestigeLevel>0){
      ctx.font='bold 10px "Courier New"'; ctx.fillStyle='#FFD700';
      ctx.fillText(`✦ PRESTIGE ${prestigeLevel}  +${Math.round((prestigeMult-1)*100)}% spd`,12,68);
    }

    // global upgrades panel
    const panelW=200,rowH=15,panelTop=prestigeLevel>0?74:62;
    ctx.fillStyle='rgba(0,0,0,0.48)';
    ctx.fillRect(6,panelTop-2,panelW,GLOBAL_UPGRADES.length*rowH+10);
    ctx.font='bold 10px "Courier New"';
    GLOBAL_UPGRADES.forEach((u,i)=>{
      const ry=panelTop+8+i*rowH;
      const done=UPG[u.key];
      if(done){ctx.fillStyle='#44FF88';ctx.fillText(`✓ ${u.label}  — ${u.desc}`,12,ry);}
      else{ctx.fillStyle=player.money>=u.cost?'#FFFF44':'rgba(255,255,255,0.28)';
        ctx.fillText(`  ${u.label} [$${u.cost}]  ${u.desc}`,12,ry);}
    });
    const nextG=GLOBAL_UPGRADES.find(u=>!UPG[u.key]);
    if(nextG){
      const frac=Math.min(1,player.money/nextG.cost);
      const bx=8,by2=panelTop+8+GLOBAL_UPGRADES.length*rowH+2,bw=panelW-4;
      ctx.fillStyle='#111122'; ctx.fillRect(bx,by2,bw,4);
      ctx.fillStyle='#44FF88'; ctx.fillRect(bx,by2,bw*frac,4);
    }

    // win progress (sold counts)
    const wpX=cv.width-110, wpY=44;
    ctx.fillStyle='rgba(0,0,0,0.48)'; ctx.fillRect(wpX-4,wpY-12,110,58);
    ctx.font='bold 9px "Courier New"'; ctx.textAlign='left';
    ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.fillText('MEGA INVENTION:',wpX,wpY);
    [1,2,3].forEach((t,i)=>{
      const got=soldCount[t]||0, need=WIN_TARGETS[t];
      const done2=got>=need;
      ctx.fillStyle=done2?'#44FF88':INV_COL[t];
      ctx.fillText(`Tier ${t}: ${Math.min(got,need)}/${need} ${done2?'✓':''}`,wpX,wpY+12+i*13);
    });

    ctx.textAlign='right'; ctx.font='bold 12px "Courier New"';
    ctx.fillStyle=shelfInventory.length===MAX_SHELF?'#FF8844':'#88FFCC';
    ctx.fillText(`SHELF ${shelfInventory.length}/${MAX_SHELF}`,cv.width-12,26);

    ctx.textAlign='center'; ctx.font='11px Segoe UI'; ctx.fillStyle='rgba(255,255,255,0.18)';
    const hint=upgradePrompt?'[1] Speed upgrade  ·  [2] Quality upgrade  ·  move away to cancel':
      'WASD move  ·  SPACE work  ·  E unlock/upgrade/fix  ·  1/2 choose upgrade';
    ctx.fillText(hint,cv.width/2,cv.height-10);

    // ── WIN OVERLAY ───────────────────────────────────────────────
    if(winAchieved) {
      ctx.fillStyle='rgba(0,0,0,0.78)'; ctx.fillRect(0,0,cv.width,cv.height);
      ctx.textAlign='center';
      const pulse=1+Math.sin(gameTime*4)*0.04;
      ctx.save(); ctx.translate(cv.width/2,cv.height/2-50); ctx.scale(pulse,pulse);
      ctx.font='bold 42px Impact,Arial Black';
      ctx.strokeStyle='#000'; ctx.lineWidth=6; ctx.strokeText('MEGA INVENTION!',0,0);
      ctx.fillStyle='#FFD700'; ctx.fillText('MEGA INVENTION!',0,0);
      ctx.restore();
      ctx.font='16px "Courier New"'; ctx.fillStyle='#88FFCC';
      ctx.fillText('Your inventions have changed the world.',cv.width/2,cv.height/2+10);
      ctx.font='bold 13px "Courier New"'; ctx.fillStyle='#FFFFFF';
      ctx.fillText(`[P] PRESTIGE — restart with ${Math.round((1+(prestigeLevel+1)*0.35-1)*100)}% permanent speed bonus`,cv.width/2,cv.height/2+38);
      if(prestigeLevel>0){
        ctx.font='11px "Courier New"'; ctx.fillStyle='#FFD700';
        ctx.fillText(`Current: Prestige ${prestigeLevel} (+${Math.round((prestigeMult-1)*100)}% speed)`,cv.width/2,cv.height/2+58);
      }
    }
  }

  // ── GAME LOOP ─────────────────────────────────────────────────────
  let lastTime=0;
  function loop(now) {
    const dt=Math.min((now-lastTime)/1000,0.05); lastTime=now; gameTime+=dt;
    for(let i=slapFX.length-1;i>=0;i--){slapFX[i].t-=dt;if(slapFX[i].t<=0)slapFX.splice(i,1);}

    // cancel upgrade prompt if player moves away
    if(upgradePrompt) {
      const m=upgradePrompt.machine;
      const ddx=m.x+0.5-(player.x+0.44),ddy=m.y+0.5-(player.y+0.35);
      if(Math.sqrt(ddx*ddx+ddy*ddy)>3.0) upgradePrompt=null;
    }

    let dx=0,dy=0;
    if(keys['w']||keys['arrowup'])    {dx-=1;dy-=1;}
    if(keys['s']||keys['arrowdown'])  {dx+=1;dy+=1;}
    if(keys['a']||keys['arrowleft'])  {dx-=1;dy+=1;}
    if(keys['d']||keys['arrowright']) {dx+=1;dy-=1;}
    const moving=dx!==0||dy!==0;
    if(moving){
      const len=Math.sqrt(dx*dx+dy*dy);
      player.x+=(dx/len)*player.speed*dt;
      player.y+=(dy/len)*player.speed*dt;
      walkTimer+=dt; if(walkTimer>0.16){walkTimer=0;walkCycle=1-walkCycle;}
    } else {walkCycle=0;}

    player.x=Math.max(LAB.x1,Math.min(LAB.x2,player.x));
    player.y=Math.max(LAB.y1,Math.min(LAB.y2,player.y));

    if(pendingWork&&!winAchieved){tryWork();pendingWork=false;}
    if(pendingBuy&&!winAchieved){tryBuy();pendingBuy=false;}
    if(pending1&&!winAchieved){tryUpgradeChoice('speed');pending1=false;}
    if(pending2&&!winAchieved){tryUpgradeChoice('quality');pending2=false;}
    if(pendingPrestige&&winAchieved){doPrestige();}
    pendingWork=pendingBuy=pending1=pending2=pendingPrestige=false;

    if(!winAchieved){
      updateMachines(dt);
      updateLabBot(dt);
      updateNPCs(dt);
      updateVIP(dt);
      checkGlobalUpgrades();
    }

    render();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
